<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Master Pro v5 - Görsel Editör</title>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .page-card { position: relative; border: 2px solid transparent; transition: all 0.2s; }
        .page-card:hover { border-color: #3b82f6; transform: scale(1.05); }
        .delete-btn { position: absolute; top: -10px; right: -10px; background: #ef4444; color: white; border-radius: 50%; width: 25px; height: 25px; display: flex; items-center: center; justify-content: center; cursor: pointer; border: 2px solid white; font-weight: bold; }
        .drop-zone { border: 2px dashed #cbd5e1; transition: all 0.3s; }
        .drop-zone.drag-over { border-color: #3b82f6; background-color: #eff6ff; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20 font-sans">

    <div class="max-w-6xl mx-auto py-10 px-6">
        <header class="text-center mb-12">
            <h1 class="text-5xl font-black text-blue-600 mb-2 italic">PDF MASTER V5</h1>
            <p class="text-slate-500 font-medium">Görsel Düzenleme ve Sayfa Yönetimi Paneli</p>
        </header>

        <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border-2 border-blue-100 mb-10">
            <h2 class="text-2xl font-bold mb-6 flex items-center text-blue-700">🖼️ Görsel Editör (Sayfa Yönetimi)</h2>
            
            <div id="editorDrop" class="drop-zone p-10 rounded-3xl text-center mb-6 cursor-pointer">
                <p class="text-slate-500">Düzenlemek istediğiniz PDF'i buraya sürükleyin veya tıklayın</p>
                <input type="file" id="editorInput" accept=".pdf" class="hidden">
            </div>

            <div id="pageContainer" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6 mb-8 min-h-[100px] p-4 bg-slate-50 rounded-2xl">
                <p class="text-slate-400 text-sm col-span-full text-center py-10 italic">Henüz dosya seçilmedi...</p>
            </div>

            <div class="flex flex-wrap gap-4">
                <input type="text" id="finalName" placeholder="Yeni dosya adı" class="flex-1 p-3 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 shadow-inner">
                <button onclick="saveEditedPdf()" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold hover:bg-blue-700 shadow-lg">Değişiklikleri Kaydet ve İndir</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-white p-8 rounded-[2rem] shadow-sm border">
                <h3 class="font-bold text-xl mb-4">🖼️ Görselden PDF</h3>
                <input type="file" id="jpgInput" multiple accept="image/*" class="block w-full text-sm text-slate-500 mb-4">
                <button onclick="jpgToPdf()" class="w-full bg-slate-800 text-white py-3 rounded-xl font-bold hover:bg-black">PDF Yap</button>
            </div>
            <div class="bg-white p-8 rounded-[2rem] shadow-sm border">
                <h3 class="font-bold text-xl mb-4">➕ PDF Birleştir</h3>
                <input type="file" id="mergeInput" multiple accept=".pdf" class="block w-full text-sm text-slate-500 mb-4">
                <button onclick="mergePdfs()" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold hover:bg-emerald-700">Birleştir</button>
            </div>
        </div>
    </div>

    <script>
        const { PDFDocument } = PDFLib;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let currentPdfDoc = null;
        let pageIndices = []; // Tutulan sayfa indisleri

        // --- EDİTÖR SÜRÜKLE BIRAK ---
        const editorDrop = document.getElementById('editorDrop');
        const editorInput = document.getElementById('editorInput');
        editorDrop.onclick = () => editorInput.click();
        
        editorInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (file) loadPdfForEditing(file);
        };

        // --- PDF'İ GÖRSEL OLARAK YÜKLE ---
        async function loadPdfForEditing(file) {
            const container = document.getElementById('pageContainer');
            container.innerHTML = '<p class="col-span-full text-center py-10">Sayfalar oluşturuluyor...</p>';
            
            const arrayBuffer = await file.arrayBuffer();
            currentPdfDoc = await PDFDocument.load(arrayBuffer);
            const pdfJsDoc = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
            
            container.innerHTML = '';
            pageIndices = [];

            for (let i = 1; i <= pdfJsDoc.numPages; i++) {
                pageIndices.push(i - 1);
                const page = await pdfJsDoc.getPage(i);
                const viewport = page.getViewport({scale: 0.3});
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                await page.render({canvasContext: context, viewport: viewport}).promise;

                const card = document.createElement('div');
                card.className = 'page-card bg-white p-2 shadow rounded-lg';
                card.setAttribute('data-index', i - 1);
                card.innerHTML = `
                    <div class="delete-btn" onclick="removePageCard(${i - 1})">×</div>
                    <img src="${canvas.toDataURL()}" class="w-full h-auto rounded">
                    <p class="text-[10px] text-center mt-1 font-bold text-slate-400">Sayfa ${i}</p>
                `;
                container.appendChild(card);
            }
        }

        function removePageCard(index) {
            const card = document.querySelector(`[data-index="${index}"]`);
            card.remove();
            pageIndices = pageIndices.filter(i => i !== index);
        }

        async function saveEditedPdf() {
            if (!currentPdfDoc || pageIndices.length === 0) return alert("Düzenlenecek sayfa kalmadı!");
            
            const newPdf = await PDFDocument.create();
            const copiedPages = await newPdf.copyPages(currentPdfDoc, pageIndices);
            copiedPages.forEach(p => newPdf.addPage(p));

            const bytes = await newPdf.save();
            const name = document.getElementById('finalName').value || "duzenlenmis_pdf";
            download(bytes, name);
        }

        // --- YARDIMCI: İNDİRME ---
        function download(bytes, name) {
            const blob = new Blob([bytes], { type: "application/pdf" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = name.endsWith(".pdf") ? name : name + ".pdf";
            link.click();
        }

        // --- JPG TO PDF (v4 İLE AYNI) ---
        async function jpgToPdf() {
            const files = document.getElementById('jpgInput').files;
            if (files.length === 0) return;
            const pdfDoc = await PDFDocument.create();
            for (const file of files) {
                const img = await pdfDoc.embedJpg(await file.arrayBuffer());
                const page = pdfDoc.addPage([img.width, img.height]);
                page.drawImage(img, { x: 0, y: 0, width: img.width, height: img.height });
            }
            download(await pdfDoc.save(), "resimden_pdf");
        }

        // --- MERGE (v4 İLE AYNI) ---
        async function mergePdfs() {
            const files = document.getElementById('mergeInput').files;
            if (files.length < 2) return;
            const pdf = await PDFDocument.create();
            for (const file of files) {
                const doc = await PDFDocument.load(await file.arrayBuffer());
                (await pdf.copyPages(doc, doc.getPageIndices())).forEach(p => pdf.addPage(p));
            }
            download(await pdf.save(), "birlesik_pdf");
        }
    </script>
</body>
</html>
